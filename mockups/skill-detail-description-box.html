<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skill Detail Description Box Mockup</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f6f2;
      --text: #282824;
      --muted: #77766f;
      --soft: #eeede8;
      --hover: #e4e2dc;
      --line: #ddd9cf;
      --panel: #fbfaf7;
      --panel-strong: #ffffff;
      --accent: #2f7d57;
      --accent-soft: #dceee5;
      --shadow: 0 24px 80px rgba(22, 22, 18, .18);
      --code: #f1f0eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181815;
        --text: #ece9df;
        --muted: #aaa69a;
        --soft: #24231f;
        --hover: #2f2e29;
        --line: #39362f;
        --panel: #1e1d1a;
        --panel-strong: #24231f;
        --accent: #8bd7ac;
        --accent-soft: rgba(139, 215, 172, .14);
        --shadow: 0 28px 90px rgba(0, 0, 0, .42);
        --code: #151512;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      letter-spacing: 0;
    }

    .toolbar {
      position: fixed;
      inset: 0 0 auto;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      gap: 8px;
      color: var(--muted);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(18px);
      z-index: 3;
    }

    .tab {
      padding: 7px 12px;
      border-radius: 9px;
      font-weight: 600;
    }

    .tab.active {
      color: var(--text);
      background: var(--soft);
    }

    main {
      width: min(860px, calc(100vw - 44px));
      margin: 0 auto;
      padding: 88px 0 56px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 720;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .search {
      height: 42px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .section-title {
      margin: 26px 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .skill-row {
      width: 100%;
      min-height: 72px;
      border: 0;
      border-radius: 8px;
      padding: 12px 12px;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 14px;
      align-items: center;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: background-color 180ms ease, transform 180ms ease;
    }

    .skill-row:hover {
      background: var(--hover);
      transform: translateY(-1px);
    }

    .skill-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--panel);
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      overflow: hidden;
    }

    .skill-icon img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .skill-name {
      font-size: 15px;
      font-weight: 720;
      margin-bottom: 2px;
    }

    .skill-copy {
      max-width: 650px;
      color: var(--muted);
      font-size: 13.5px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .installed {
      color: #111111;
      font-size: 20px;
      padding-right: 16px;
    }

    @media (prefers-color-scheme: dark) {
      .installed {
        color: var(--text);
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 72px 22px 36px;
      background: rgba(0, 0, 0, .24);
      backdrop-filter: blur(3px);
      z-index: 10;
    }

    .overlay.open {
      display: flex;
    }

    .detail {
      width: min(820px, 100%);
      max-height: min(780px, calc(100vh - 98px));
      border-radius: 12px;
      background: var(--bg);
      box-shadow: var(--shadow);
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      overflow: hidden;
    }

    .detail-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 28px 28px 20px;
      background: var(--bg);
      border-bottom: 0;
    }

    .detail-title {
      font-size: 33px;
      line-height: 1.13;
      font-weight: 650;
      margin: 0 0 14px;
      letter-spacing: 0;
    }

    .detail-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 4px 8px;
      border-radius: 7px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 560;
    }

    .close {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .close:hover {
      background: var(--hover);
      color: var(--text);
    }

    .detail-body {
      padding: 0 28px 28px;
    }

    .summary {
      margin: 0 0 34px;
      color: var(--muted);
      font-size: 25px;
      line-height: 1.38;
      font-weight: 360;
      letter-spacing: 0;
    }

    .field-label {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 560;
      color: var(--muted);
    }

    .description-box {
      height: 360px;
      overflow: auto;
      padding: 34px 38px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 74%, var(--bg));
      scrollbar-width: thin;
    }

    .markdown h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.28;
      font-weight: 640;
      color: var(--text);
    }

    .markdown h3 {
      margin: 24px 0 10px;
      font-size: 17px;
      font-weight: 620;
      color: var(--text);
    }

    .markdown p {
      margin: 0 0 18px;
      color: color-mix(in srgb, var(--text) 76%, var(--muted));
      font-size: 20px;
      line-height: 1.52;
      font-weight: 350;
    }

    .markdown ul {
      margin: 0 0 20px 23px;
      padding: 0;
      color: color-mix(in srgb, var(--text) 76%, var(--muted));
      font-size: 19px;
      line-height: 1.5;
      font-weight: 350;
    }

    .markdown li {
      margin: 7px 0;
    }

    .markdown code {
      padding: 2px 5px;
      border-radius: 5px;
      background: var(--code);
      font-family: "SF Mono", Menlo, monospace;
      font-size: 12px;
    }

    .markdown pre {
      margin: 10px 0 14px;
      padding: 12px;
      border-radius: 8px;
      background: var(--code);
      overflow: auto;
    }

  </style>
</head>
<body>
  <nav class="toolbar" aria-label="Dashboard tabs">
    <span class="tab">Plugins</span>
    <span class="tab active">Skills</span>
  </nav>

  <main>
    <h1>Skills</h1>
    <p class="subtitle">Extend GetClawHub with task-specific skills</p>
    <div class="search">Search skills</div>

    <div class="section-title">Built-in</div>
    <button class="skill-row" data-skill="imagegen">
      <span class="skill-icon">
        <img src="../OpenClawInstaller/Assets.xcassets/SkillAvatarUnifiedDark.imageset/skill-day.svg" alt="" />
      </span>
      <span>
        <span class="skill-name">Image Gen</span>
        <span class="skill-copy">Generate or edit raster images for website assets, product mockups, UI concepts, and more.</span>
      </span>
      <span class="installed">✓</span>
    </button>

    <button class="skill-row" data-skill="weather">
      <span class="skill-icon">
        <img src="../OpenClawInstaller/Assets.xcassets/SkillAvatarUnifiedDark.imageset/skill-day.svg" alt="" />
      </span>
      <span>
        <span class="skill-name">Weather</span>
        <span class="skill-copy">Get current weather and forecasts through lightweight command workflows.</span>
      </span>
      <span class="installed">＋</span>
    </button>
  </main>

  <div class="overlay open" id="overlay" role="dialog" aria-modal="true" aria-label="Skill details">
    <section class="detail">
      <header class="detail-header">
        <div>
          <h2 class="detail-title" id="detail-title">Image Gen</h2>
          <div class="detail-meta">
            <span class="chip">Built-in</span>
            <span class="chip">Installed</span>
            <span class="chip">Ready</span>
          </div>
        </div>
        <button class="close" id="close" aria-label="Close">×</button>
      </header>

      <div class="detail-body">
        <p class="summary">Generate or edit raster images for website assets, product mockups, UI concepts, and other project-bound visuals.</p>
        <p class="field-label">Description</p>
        <div class="description-box">
          <article class="markdown" id="markdown"></article>
        </div>
      </div>
    </section>
  </div>

  <script>
    const docs = {
      imagegen: {
        title: "Image Gen",
        markdown: `
## Generates or edits images for the current project

Use this skill when the task benefits from AI-created bitmap visuals such as website assets, game assets, UI mockups, product mockups, wireframes, logo explorations, photorealistic images, or infographics.

### Top-level modes and rules

- Default built-in tool mode is preferred for normal image generation and editing.
- Fallback CLI mode is only used when the user explicitly asks for CLI/API/model control.
- Transparent requests use a chroma-key workflow first, then local background removal.

### When to use

- Generate a new image, concept art, product shot, cover, website hero, or mockup.
- Edit an existing image while preserving important invariants.
- Produce many assets or variants for one task.

### Workflow

1. Decide whether the request is generation or editing.
2. Collect prompt, constraints, and input image roles.
3. Generate or edit the image.
4. Inspect output quality and save project-bound assets into the workspace.

\`\`\`text
Use case: product-mockup
Asset type: landing page hero
Primary request: a minimal hero image of a ceramic coffee mug
Constraints: no logos, no text, no watermark
\`\`\`
`
      },
      weather: {
        title: "Weather",
        markdown: `
## Weather skill

Get current weather and forecasts through command workflows.

### When to use

- User asks for current weather.
- User asks for a short forecast.
- User provides a city or region.

### Notes

- Keep responses concise.
- Do not use this for historical weather analysis.
`
      }
    };

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderMarkdown(markdown) {
      const lines = markdown.trim().split("\n");
      let html = "";
      let inList = false;
      let inCode = false;
      let code = [];

      for (const raw of lines) {
        const line = raw.trimEnd();
        if (line.startsWith("```")) {
          if (inCode) {
            html += "<pre><code>" + escapeHtml(code.join("\n")) + "</code></pre>";
            code = [];
            inCode = false;
          } else {
            if (inList) { html += "</ul>"; inList = false; }
            inCode = true;
          }
          continue;
        }
        if (inCode) {
          code.push(raw);
          continue;
        }
        if (line.startsWith("### ")) {
          if (inList) { html += "</ul>"; inList = false; }
          html += "<h3>" + escapeHtml(line.slice(4)) + "</h3>";
        } else if (line.startsWith("## ")) {
          if (inList) { html += "</ul>"; inList = false; }
          html += "<h2>" + escapeHtml(line.slice(3)) + "</h2>";
        } else if (line.startsWith("- ")) {
          if (!inList) { html += "<ul>"; inList = true; }
          html += "<li>" + escapeHtml(line.slice(2)) + "</li>";
        } else if (/^\\d+\\.\\s/.test(line)) {
          if (inList) { html += "</ul>"; inList = false; }
          html += "<p>" + escapeHtml(line) + "</p>";
        } else if (line.trim()) {
          if (inList) { html += "</ul>"; inList = false; }
          html += "<p>" + escapeHtml(line) + "</p>";
        }
      }
      if (inList) html += "</ul>";
      return html;
    }

    function showSkill(id) {
      const doc = docs[id];
      document.getElementById("detail-title").textContent = doc.title;
      document.getElementById("markdown").innerHTML = renderMarkdown(doc.markdown);
      document.getElementById("overlay").classList.add("open");
    }

    document.querySelectorAll(".skill-row").forEach(row => {
      row.addEventListener("click", () => showSkill(row.dataset.skill));
    });

    document.getElementById("close").addEventListener("click", () => {
      document.getElementById("overlay").classList.remove("open");
    });

    document.getElementById("overlay").addEventListener("click", event => {
      if (event.target.id === "overlay") {
        document.getElementById("overlay").classList.remove("open");
      }
    });

    showSkill("imagegen");
  </script>
</body>
</html>
